<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Gestión de Clientes</title>
    <link rel="stylesheet" href="login.css" />
</head>
<body>

<div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" required />

        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" required />

        <button type="submit">Entrar</button>
    </form>
    <div class="message" id="message"></div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('message');

    // Simula tu función Python validacion_usuario.login
    function validacion_usuario(usuario, contrasena) {
        // Aquí puedes poner la lógica que quieres validar
        // Por ejemplo, datos "duros" para demo (como tu main)
        if (usuario === "admin" && contrasena === "12345") {
            return true;
        }
        // Podrías agregar más usuarios o lógica aquí si quieres
        return false;
    }

    form.addEventListener('submit', (e) => {
        e.preventDefault();

        const usuario = form.usuario.value.trim();
        const contrasena = form.contrasena.value.trim();

        if(validacion_usuario(usuario, contrasena)) {
            messageDiv.style.color = 'green';
            messageDiv.textContent = 'Login exitoso';
            // Aquí podrías mostrar otra pantalla, limpiar el formulario, etc.
        } else {
            messageDiv.style.color = 'red';
            messageDiv.textContent = 'Usuario o contraseña incorrectos';
        }
    });
</script>

</body>
</html>
